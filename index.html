<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Community Health Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:linear-gradient(160deg,#e8fdf8,#eaf6ff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.wrapper{
max-width:700px;
width:100%;
}

.card{
background:white;
border-radius:16px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h1{
font-family:'DM Serif Display',serif;
font-size:36px;
margin-bottom:10px;
}

.subtitle{
color:#5e8080;
margin-bottom:30px;
}

label{
font-weight:600;
font-size:14px;
}

textarea,input{
width:100%;
padding:14px;
margin-top:6px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #cce5e2;
font-size:14px;
}

textarea{
min-height:120px;
}

button{
background:linear-gradient(135deg,#0d9488,#0891b2);
border:none;
color:white;
padding:16px;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.loading{
display:none;
margin-top:15px;
color:#0d9488;
font-weight:600;
}

.success{
display:none;
margin-top:15px;
color:green;
font-weight:600;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<h1>AI Community Health Assistant</h1>
<p class="subtitle">Ask a health question and receive AI advice by email.</p>

<form id="healthForm"
action="https://form.relay.app/form/jVqwi-SsnkqAqDquLt2ILg"
method="POST"
target="hidden_iframe"
onsubmit="showLoading()">

<label>Your Health Question *</label>
<textarea name="Health Question" required></textarea>

<label>Email Address *</label>
<input type="email" name="User Email" required>

<button type="submit">Get Health Advice</button>

</form>

<div class="loading" id="loadingMsg">
🤖 AI is analysing your question...
</div>

<div class="success" id="successMsg">
✅ Request submitted! Check your email for health advice.
</div>

<iframe name="hidden_iframe" style="display:none;" onload="showSuccess()"></iframe>

</div>

</div>

<script>

function showLoading(){
document.getElementById("loadingMsg").style.display="block";
}

function showSuccess(){
document.getElementById("loadingMsg").style.display="none";
document.getElementById("successMsg").style.display="block";
}

</script>

</body>
</html>
